<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlixHub | Watch & Upload</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #e50914;
    --primary-hover: #b80710;
    --bg-dark: #141414;
    --card-bg: #1f1f1f;
    --text-main: #ffffff;
    --text-muted: #aaaaaa;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    overflow-x: hidden;
}

/* NAV BAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 5%;
    background: rgba(0, 0, 0, 0.8);
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
    backdrop-filter: blur(10px);
}

.logo {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--primary);
    text-transform: uppercase;
}

.nav-links {
    display: flex;
    gap: 20px;
    align-items: center;
}

.btn {
    padding: 10px 20px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s ease;
    text-decoration: none;
}

.btn:hover {
    background: var(--primary-hover);
}

/* HERO BANNER */
.hero {
    height: 60vh;
    background: linear-gradient(to top, var(--bg-dark), transparent),
                linear-gradient(to right, rgba(0,0,0,0.8), transparent),
                url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=1200&q=80') center/cover;
    display: flex;
    align-items: center;
    padding: 0 5%;
    margin-top: 60px;
}

.hero-content {
    max-width: 500px;
}

.hero h1 {
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 10px;
}

.hero p {
    color: var(--text-muted);
    margin-bottom: 20px;
}

/* MAIN CONTENT */
section {
    padding: 40px 5%;
}

h2 {
    font-size: 1.5rem;
    margin-bottom: 20px;
}

/* MOVIE GRID */
.movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
}

.movie-card {
    background: var(--card-bg);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.movie-card:hover {
    transform: translateY(-8px);
}

.movie-thumb {
    width: 100%;
    height: 280px;
    object-fit: cover;
}

.movie-info {
    padding: 15px;
}

.movie-title {
    font-size: 1rem;
    font-weight: 700;
}

.movie-genre {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 5px;
}

/* UPLOAD SECTION */
.upload-card {
    background: var(--card-bg);
    padding: 30px;
    border-radius: 12px;
    max-width: 600px;
    margin: 0 auto;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.9rem;
    color: var(--text-muted);
}

.form-group input, .form-group select {
    width: 100%;
    padding: 12px;
    background: #2b2b2b;
    border: 1px solid #333;
    color: #fff;
    border-radius: 6px;
    outline: none;
}

/* VIDEO PLAYER MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    width: 90%;
    max-width: 900px;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
}

video {
    width: 100%;
    height: auto;
    display: block;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
    z-index: 1001;
}
</style>
</head>
<body>

<nav>
    <div class="logo">FlixHub</div>
    <div class="nav-links">
        <a href="#library" class="btn" style="background: transparent;">Library</a>
        <a href="#upload" class="btn">Upload Movie</a>
    </div>
</nav>

<div class="hero">
    <div class="hero-content">
        <h1>Featured Film</h1>
        <p>Watch full HD community-uploaded movies directly from your web browser.</p>
        <button class="btn" onclick="playVideo('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4')">▶ Play Now</button>
    </div>
</div>

<section id="library">
    <h2>All Movies</h2>
    <div class="movie-grid" id="movieGrid">
        
        <div class="movie-card" onclick="playVideo('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4')">
            <img class="movie-thumb" src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=400&q=80" alt="Thumbnail">
            <div class="movie-info">
                <div class="movie-title">Big Buck Bunny</div>
                <div class="movie-genre">Animation • 2008</div>
            </div>
        </div>

        <div class="movie-card" onclick="playVideo('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4')">
            <img class="movie-thumb" src="https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=400&q=80" alt="Thumbnail">
            <div class="movie-info">
                <div class="movie-title">Elephant's Dream</div>
                <div class="movie-genre">Sci-Fi • 2006</div>
            </div>
        </div>

    </div>
</section>

<section id="upload">
    <h2>Upload a Movie</h2>
    <div class="upload-card">
        <form id="uploadForm">
            <div class="form-group">
                <label>Movie Title</label>
                <input type="text" id="movieTitle" placeholder="Enter title" required>
            </div>
            <div class="form-group">
                <label>Genre / Category</label>
                <input type="text" id="movieGenre" placeholder="e.g. Action, Sci-Fi" required>
            </div>
            <div class="form-group">
                <label>Select Video File</label>
                <input type="file" id="videoFile" accept="video/*" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Upload & Add to Library</button>
        </form>
    </div>
</section>

<div class="modal" id="videoModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <video id="player" controls>
            <source id="videoSource" src="" type="video/mp4">
            Your browser does not support HTML5 video.
        </video>
    </div>
</div>

<script>
const modal = document.getElementById('videoModal');
const player = document.getElementById('player');
const videoSource = document.getElementById('videoSource');
const uploadForm = document.getElementById('uploadForm');
const movieGrid = document.getElementById('movieGrid');

// Open Video Player
function playVideo(url) {
    videoSource.src = url;
    player.load();
    modal.style.display = 'flex';
    player.play();
}

// Close Video Player
function closePlayer() {
    modal.style.display = 'none';
    player.pause();
    videoSource.src = "";
}

// Local File Upload Handler
uploadForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const title = document.getElementById('movieTitle').value;
    const genre = document.getElementById('movieGenre').value;
    const fileInput = document.getElementById('videoFile');
    const file = fileInput.files[0];

    if (file) {
        // Create local Blob URL to play immediately from browser memory
        const videoURL = URL.createObjectURL(file);

        // Create new Movie Card HTML
        const newCard = document.createElement('div');
        newCard.className = 'movie-card';
        newCard.onclick = function() { playVideo(videoURL); };
        
        newCard.innerHTML = `
            <img class="movie-thumb" src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=400&q=80" alt="Thumbnail">
            <div class="movie-info">
                <div class="movie-title">${title}</div>
                <div class="movie-genre">${genre} • Uploaded</div>
            </div>
        `;

        // Add card to grid
        movieGrid.appendChild(newCard);

        // Reset form
        uploadForm.reset();
        alert('Movie uploaded to your browser session!');
    }
});
</script>

</body>
</html>
