<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FryedCinema | Watch & Upload</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #ff9800;
    --primary-hover: #e68a00;
    --bg-dark: #0f0f11;
    --card-bg: #1a1a1e;
    --text-main: #ffffff;
    --text-muted: #a0a0ab;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    overflow-x: hidden;
}

/* NAV BAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 5%;
    background: rgba(15, 15, 17, 0.85);
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 152, 0, 0.1);
}

.logo {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: -0.5px;
}

.nav-links {
    display: flex;
    gap: 20px;
    align-items: center;
}

.btn {
    padding: 10px 22px;
    background: var(--primary);
    color: #000;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s ease;
    text-decoration: none;
}

.btn:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
}

/* HERO BANNER */
.hero {
    height: 45vh;
    background: linear-gradient(to top, var(--bg-dark), transparent),
                linear-gradient(to right, rgba(0,0,0,0.85), transparent),
                url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=1200&q=80') center/cover;
    display: flex;
    align-items: center;
    padding: 0 5%;
    margin-top: 60px;
}

.hero-content {
    max-width: 550px;
}

.hero h1 {
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 10px;
}

.hero p {
    color: var(--text-muted);
    margin-bottom: 20px;
}

/* MAIN CONTENT */
section {
    padding: 40px 5%;
}

h2 {
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 24px;
}

h2 span {
    color: var(--primary);
}

/* MOVIE GRID */
.movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
}

.movie-card {
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
}

.movie-card:hover {
    border-color: rgba(255, 152, 0, 0.4);
    box-shadow: 0 10px 25px rgba(255, 152, 0, 0.15);
}

.movie-video {
    width: 100%;
    height: 180px;
    background: #000;
    object-fit: cover;
}

.movie-info {
    padding: 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex-grow: 1;
}

.movie-title {
    font-size: 1.1rem;
    font-weight: 700;
}

.movie-genre {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 4px;
    margin-bottom: 12px;
}

/* UPLOAD SECTION */
.upload-card {
    background: var(--card-bg);
    padding: 35px;
    border-radius: 16px;
    max-width: 650px;
    margin: 0 auto;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-muted);
}

.form-group input, .form-group select {
    width: 100%;
    padding: 14px;
    background: #25252a;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    border-radius: 8px;
    outline: none;
}

.form-group input:focus {
    border-color: var(--primary);
}

.upload-type-selector {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.type-btn {
    flex: 1;
    padding: 10px;
    background: #25252a;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

.type-btn.active {
    background: var(--primary);
    color: #000;
    border-color: var(--primary);
}

/* FULLSCREEN MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.92);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    width: 90%;
    max-width: 960px;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
}

#fullscreenPlayer {
    width: 100%;
    height: auto;
    max-height: 80vh;
    display: block;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    color: #fff;
    font-size: 2.2rem;
    cursor: pointer;
    z-index: 1001;
}

.close-btn:hover {
    color: var(--primary);
}
</style>
</head>
<body>

<nav>
    <div class="logo">🍿 FryedCinema</div>
    <div class="nav-links">
        <a href="#library" class="btn" style="background: transparent; color: #fff;">Library</a>
        <a href="#upload" class="btn">Upload Movie</a>
    </div>
</nav>

<div class="hero">
    <div class="hero-content">
        <h1>Welcome to FryedCinema</h1>
        <p>20 Free classic movies ready to stream instantly. Upload local files or paste direct video URLs to add your own!</p>
        <button class="btn" onclick="openFullscreen('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4')">▶ Featured Movie</button>
    </div>
</div>

<section id="library">
    <h2>Movie <span>Library (20 Free Movies)</span></h2>
    <div class="movie-grid" id="movieGrid"></div>
</section>

<section id="upload">
    <h2>Add to <span>FryedCinema</span></h2>
    <div class="upload-card">
        
        <div class="upload-type-selector">
            <button class="type-btn active" id="btnUrl" onclick="setUploadType('url')">Paste Video URL</button>
            <button class="type-btn" id="btnFile" onclick="setUploadType('file')">Upload Local File</button>
        </div>

        <form id="uploadForm">
            <div class="form-group">
                <label>Movie Title</label>
                <input type="text" id="movieTitle" placeholder="Enter movie title" required>
            </div>
            <div class="form-group">
                <label>Genre / Category</label>
                <input type="text" id="movieGenre" placeholder="e.g. Sci-Fi, Comedy, Action" required>
            </div>

            <div class="form-group" id="urlGroup">
                <label>Direct Video URL (.mp4, .webm)</label>
                <input type="url" id="movieUrl" placeholder="https://example.com/movie.mp4">
            </div>

            <div class="form-group" id="fileGroup" style="display: none;">
                <label>Select Local Video File</label>
                <input type="file" id="videoFile" accept="video/*">
            </div>

            <button type="submit" class="btn" style="width: 100%;">Add Movie to Library</button>
        </form>
    </div>
</section>

<div class="modal" id="videoModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeFullscreen()">&times;</span>
        <video id="fullscreenPlayer" controls>
            <source id="fullscreenSource" src="" type="video/mp4">
            Your browser does not support HTML5 video.
        </video>
    </div>
</div>

<script>
// 20 PRE-LOADED FREE MOVIES / STREAMS
const defaultMovies = [
    { title: "Big Buck Bunny", genre: "Animation • 2008", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" },
    { title: "Oceans World", genre: "Documentary • 2010", url: "https://vjs.zencdn.net/v/oceans.mp4" },
    { title: "Elephant's Dream", genre: "Sci-Fi • 2006", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" },
    { title: "For Bigger Blazes", genre: "Action • 2015", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
    { title: "Sintel", genre: "Fantasy • 2010", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4" },
    { title: "For Bigger Escapes", genre: "Adventure • 2016", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" },
    { title: "Tears of Steel", genre: "Sci-Fi • 2012", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4" },
    { title: "Subway Express", genre: "Short Film • 2021", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Subway.mp4" },
    { title: "For Bigger Fun", genre: "Comedy • 2017", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4" },
    { title: "For Bigger Joyrides", genre: "Action • 2018", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4" },
    { title: "We Are Going On Bullrun", genre: "Documentary • 2019", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/WeAreGoingOnBullrun.mp4" },
    { title: "What Car Can You Get", genre: "Entertainment • 2020", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/WhatCarCanYouGetForAGrand.mp4" },
    { title: "Chromecast Launch", genre: "Tech • 2013", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TechTalk.mp4" },
    { title: "Pixel Dream", genre: "Animation • 2021", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" },
    { title: "Deep Sea Wonders", genre: "Nature • 2015", url: "https://vjs.zencdn.net/v/oceans.mp4" },
    { title: "The Steel Chronicles", genre: "Sci-Fi • 2013", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4" },
    { title: "Dragon Quest", genre: "Fantasy • 2011", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4" },
    { title: "Velocity Pursuit", genre: "Thriller • 2018", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
    { title: "Cyber Escape", genre: "Action • 2019", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" },
    { title: "The Grand Journey", genre: "Adventure • 2022", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" }
];

const movieGrid = document.getElementById('movieGrid');
const modal = document.getElementById('videoModal');
const fullscreenPlayer = document.getElementById('fullscreenPlayer');
const fullscreenSource = document.getElementById('fullscreenSource');
const uploadForm = document.getElementById('uploadForm');

let currentUploadType = 'url';

// Load default 20 movies on page startup
function loadMovies() {
    defaultMovies.forEach(movie => {
        addMovieCard(movie.title, movie.genre, movie.url);
    });
}

// Helper to append a card to grid
function addMovieCard(title, genre, url) {
    const card = document.createElement('div');
    card.className = 'movie-card';
    card.innerHTML = `
        <video class="movie-video" controls preload="metadata">
            <source src="${url}" type="video/mp4">
        </video>
        <div class="movie-info">
            <div>
                <div class="movie-title">${title}</div>
                <div class="movie-genre">${genre}</div>
            </div>
            <button class="btn" style="width: 100%; padding: 8px; margin-top: 10px;" onclick="openFullscreen('${url}')">Watch Fullscreen</button>
        </div>
    `;
    movieGrid.appendChild(card);
}

// Toggle URL vs File upload inputs
function setUploadType(type) {
    currentUploadType = type;
    if (type === 'url') {
        document.getElementById('urlGroup').style.display = 'block';
        document.getElementById('fileGroup').style.display = 'none';
        document.getElementById('btnUrl').classList.add('active');
        document.getElementById('btnFile').classList.remove('active');
        document.getElementById('movieUrl').required = true;
        document.getElementById('videoFile').required = false;
    } else {
        document.getElementById('urlGroup').style.display = 'none';
        document.getElementById('fileGroup').style.display = 'block';
        document.getElementById('btnFile').classList.add('active');
        document.getElementById('btnUrl').classList.remove('active');
        document.getElementById('movieUrl').required = false;
        document.getElementById('videoFile').required = true;
    }
}

// Handle Form Submission
uploadForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const title = document.getElementById('movieTitle').value;
    const genre = document.getElementById('movieGenre').value;
    let videoURL = "";

    if (currentUploadType === 'url') {
        videoURL = document.getElementById('movieUrl').value;
    } else {
        const file = document.getElementById('videoFile').files[0];
        if (file) {
            videoURL = URL.createObjectURL(file);
        }
    }

    if (videoURL) {
        addMovieCard(title, genre + " • Added", videoURL);
        uploadForm.reset();
        alert('Movie added to FryedCinema!');
    }
});

// Fullscreen functions
function openFullscreen(url) {
    fullscreenSource.src = url;
    fullscreenPlayer.load();
    modal.style.display = 'flex';
    fullscreenPlayer.play();
}

function closeFullscreen() {
    modal.style.display = 'none';
    fullscreenPlayer.pause();
    fullscreenSource.src = "";
}

// Run loader
loadMovies();
</script>

</body>
</html>
